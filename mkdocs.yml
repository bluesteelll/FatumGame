site_name: FatumGame Technical Documentation
site_description: Architecture, systems, and API reference for the FatumGame UE5 project
site_url: https://fatumgame.github.io/FatumGame/
repo_url: https://github.com/fatumgame/FatumGame
repo_name: FatumGame

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.tabs
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - pymdownx.critic
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - tags
  - i18n:
      docs_structure: suffix
      default_language: en
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: ru
          name: Русский
          build: true
          nav_translations:
            Home: Главная
            Architecture: Архитектура
            Overview: Обзор
            Threading Model: Модель потоков
            ECS Patterns: Паттерны ECS
            Collision Pipeline: Конвейер столкновений
            Render Interpolation: Интерполяция рендера
            Lock-Free Binding: Lock-free связывание
            Systems: Системы
            Spawn Pipeline: Конвейер спавна
            Damage System: Система урона
            Weapon System: Система оружия
            Character System: Система персонажа
            Movement System: Система движения
            "Item & Container System": Система предметов и контейнеров
            Interaction System: Система взаимодействия
            Destructible System: Система разрушений
            Door System: Система дверей
            Time Dilation: Замедление времени
            Stealth System: Система скрытности
            Ability System: Система способностей
            System Execution Order: Порядок выполнения систем
            API Reference: Справочник API
            Blueprint Libraries: Библиотеки Blueprint
            Flecs API Reference: Справочник Flecs API
            "Data Assets & Profiles": Дата-ассеты и профили
            ECS Components: Компоненты ECS
            Subsystems: Подсистемы
            Actors: Акторы
            Plugins: Плагины
            "Barrage (Jolt Physics)": Barrage (физика Jolt)
            Flecs Integration: Интеграция Flecs
            FlecsBarrage Bridge: Мост FlecsBarrage
            FlecsUI Framework: Фреймворк FlecsUI
            UI: Интерфейс
            Inventory: Инвентарь
            HUD: HUD
            Loot Panel: Панель лута
            Guidelines: Руководства
            Coding Standards: Стандарты кода
            Threading Rules: Правила потокобезопасности
            ECS Best Practices: Лучшие практики ECS
            Common Bugs: Типичные баги
            "Adding a New Entity": Создание новой сущности
            Rationale: Обоснования
            "Why ECS + Physics": Почему ECS + физика
            "Why Simulation Thread": Почему отдельный поток
            "Why ISM Rendering": Почему ISM рендеринг
            "Why Collision Pairs": Почему пары столкновений
            "Why Lock-Free": Почему lock-free
            "Why Domain Folders": Почему доменные папки
            Project: Проект
            Folder Structure: Структура папок
            Build Setup: Настройка сборки
            Glossary: Глоссарий

